<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="welcome me, i'm 梁婧 - 个人作品集">
  <title>welcome me, i'm 梁婧</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="bundle.css?v=32">
</head>
<body>

  <!-- ======== 纸张纹理叠加层 ======== -->
  <div class="paper-texture"></div>

  <!-- ======== 主体内容 ======== -->
  <div class="main-content">

    <!-- ======== 导航栏 ======== -->
    <nav class="navbar" id="navbar">
      <div class="nav-container">
        <a href="#" class="nav-logo" id="navLogo" data-ts-key="nav.logo">梁婧</a>
        <ul class="nav-links" id="navLinks">
          <!-- JS 动态生成 -->
        </ul>
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="菜单">☰</button>
      </div>
    </nav>

    <!-- ======== 封面页 ======== -->
    <section class="cover-section" id="cover">
      <div class="cover-wrapper" id="coverWrapper">
        <div class="cover-sticky">
          <h1 class="cover-title" id="coverTitle" data-ts-key="cover.title">welcome me, i'm 梁婧</h1>
          <button class="cover-explore-btn" id="coverExploreBtn" data-ts-key="cover.button">let's explore more</button>
          <div class="cover-nav-buttons" id="coverNavButtons">
            <!-- JS -->
          </div>
          <div class="cover-img-layer" id="coverImgLayer">
            <!-- 由 JS 动态渲染，数据来自 data.js coverImages -->
          </div>
          </div>
        </div>
      </div>
    </section>

<!-- ======== 第1区：个人信息 ======== -->
    <section class="section" id="personal">
      <div id="personalInfo">
        <!-- JS 动态渲染 -->
      </div>
    </section>

    <!-- ======== 第2区：AI匹配器 ======== -->
    <section class="section" id="matcher">
      <div id="matcherSection" class="matcher-iframe-wrapper">
        <iframe src="matcher.html" class="matcher-iframe" title="AI 岗位匹配器"></iframe>
      </div>
    </section>

    <!-- ======== 第2.5区：我的技能 ======== -->
    <section class="section" id="skills">
      <div id="mySkills">
        <!-- JS 动态渲染 -->
      </div>
    </section>

    <!-- ======== 第3区：工作 & 项目经历 (ScrollStack) ======== -->
    <section class="section" id="experience">
      <div id="experienceSection">
        <!-- JS 动态渲染 -->
      </div>
    </section>

    <!-- ======== 第4区：科研经历 ======== -->
    <section class="section" id="research">
      <div id="researchSection">
        <!-- JS 动态渲染 -->
      </div>
    </section>

    <!-- ======== 第5区：作品集 ======== -->
    <section class="section" id="portfolio">
      <div id="portfolioSection">
        <!-- JS 动态渲染 -->
      </div>
    </section>

    <!-- ======== 页脚 ======== -->
    <footer class="site-footer" id="siteFooter">
      <!-- JS 动态渲染 -->
    </footer>

  </div><!-- /main-content -->

  <!-- ======== 图片灯箱 ======== -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose" aria-label="关闭">&times;</button>
    <img loading="lazy" class="lightbox-content" id="lightboxImg" src="" alt="预览图片">
  </div>

  <!-- ======== 脚本 ======== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="data.js?v=12"></script>
  <script src="bundle.js?v=16"></script>
  <script src="script.js?v=23"></script>

</body>
</html>
