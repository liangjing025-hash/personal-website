<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网站内容管理后台</title>
<style>
/* ============================================================
   CMS 管理后台样式
   ============================================================ */
:root {
  --bg: #f5f5f5;
  --bg-card: #fff;
  --border: #e0e0e0;
  --text: #333;
  --text-muted: #888;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --danger: #dc2626;
  --danger-hover: #b91c1c;
  --sidebar-w: 220px;
  --topbar-h: 52px;
  --radius: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ---- 侧边栏 ---- */
.sidebar {
  width: var(--sidebar-w);
  background: #1e1e2e;
  color: #cdd6f4;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}
.sidebar-header {
  padding: 18px 16px;
  font-size: 15px;
  font-weight: 700;
  border-bottom: 1px solid rgba(255,255,255,.08);
  letter-spacing: .5px;
}
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.sidebar-nav a {
  display: block;
  padding: 9px 16px;
  color: #a6adc8;
  text-decoration: none;
  font-size: 13px;
  transition: all .15s;
  border-left: 3px solid transparent;
  cursor: pointer;
}
.sidebar-nav a:hover, .sidebar-nav a.active {
  color: #fff;
  background: rgba(255,255,255,.06);
  border-left-color: var(--accent);
}

/* ---- 主区域 ---- */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ---- 顶部栏 ---- */
.topbar {
  height: var(--topbar-h);
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
}
.topbar-title {
  font-size: 14px;
  font-weight: 600;
}
.topbar-actions {
  display: flex;
  gap: 8px;
}
.btn {
  padding: 7px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  background: var(--bg-card);
  color: var(--text);
  transition: all .15s;
}
.btn:hover { background: #f0f0f0; }
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
.btn-danger:hover { background: var(--danger-hover); }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* ---- 内容区 ---- */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px 40px;
}
.section-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  scroll-margin-top: 16px;
}
.section-card-header {
  padding: 14px 18px;
  font-weight: 600;
  font-size: 14px;
  border-bottom: 1px solid var(--border);
  background: #fafafa;
  border-radius: var(--radius) var(--radius) 0 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.section-card-body {
  padding: 16px 18px;
}

/* ---- 表单行 ---- */
.field-row {
  margin-bottom: 12px;
}
.field-row:last-child { margin-bottom: 0; }
.field-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 4px;
}

/* ---- 可编辑文字 ---- */
.editable-text {
  display: inline-block;
  min-width: 60px;
  padding: 6px 10px;
  border: 2px solid transparent;
  border-radius: 4px;
  cursor: text;
  font-size: 14px;
  transition: border-color .15s;
  width: 100%;
  background: transparent;
}
.editable-text:hover { border-color: #d0d5dd; }
.editable-text:focus {
  outline: none;
  border-color: var(--accent);
  background: #fff;
}
.editable-text[contenteditable="true"]:empty:before {
  content: attr(data-placeholder);
  color: #bbb;
}

/* ---- 文本域 ---- */
.editable-textarea {
  display: block;
  width: 100%;
  min-height: 60px;
  padding: 8px 10px;
  border: 2px solid transparent;
  border-radius: 4px;
  font-size: 14px;
  font-family: inherit;
  resize: vertical;
  transition: border-color .15s;
  background: transparent;
}
.editable-textarea:hover { border-color: #d0d5dd; }
.editable-textarea:focus {
  outline: none;
  border-color: var(--accent);
  background: #fff;
}

/* ---- 图片字段 ---- */
.image-field {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.image-preview {
  width: 120px;
  height: 90px;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: #f9f9f9;
  flex-shrink: 0;
  cursor: pointer;
  position: relative;
  transition: border-color .15s;
}
.image-preview:hover { border-color: var(--accent); }
.image-preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.image-preview .placeholder {
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
}
.image-field-actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.image-path-display {
  font-size: 12px;
  color: var(--text-muted);
  word-break: break-all;
  max-width: 280px;
}

/* ---- 列表项 ---- */
.list-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.list-item .editable-text {
  flex: 1;
}
.list-item .btn-sm {
  flex-shrink: 0;
}
.add-btn-row {
  margin-top: 8px;
}

/* ---- 对象列表（卡片） ---- */
.object-list-item {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  background: #fafafa;
  overflow: hidden;
}
.object-list-item-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  user-select: none;
}
.object-list-item-header:hover { background: #f0f0f0; }
.object-list-item-body {
  padding: 12px;
  border-top: 1px solid var(--border);
  display: none;
}
.object-list-item.open .object-list-item-body {
  display: block;
}
.object-list-item-summary {
  font-size: 12px;
  color: var(--text-muted);
  flex: 1;
  margin-left: 8px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ---- Toast ---- */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  color: #fff;
  font-weight: 500;
  animation: toastIn .3s ease;
  max-width: 360px;
}
.toast-success { background: #16a34a; }
.toast-error { background: var(--danger); }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ---- 内联编辑 input / textarea ---- */
.inline-input {
  width: 100%;
  padding: 6px 10px;
  border: 2px solid var(--accent);
  border-radius: 4px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  background: #fff;
}
.list-textarea {
  resize: vertical;
  min-height: 38px;
  line-height: 1.5;
}

/* ---- 空状态 ---- */
.empty-hint {
  font-size: 13px;
  color: var(--text-muted);
  font-style: italic;
  padding: 8px 0;
}

/* ---- 分栏 ---- */
.field-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.field-grid-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}

/* ---- 视频上传独立样式 ---- */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all .15s;
  color: var(--text-muted);
  font-size: 13px;
}
.upload-zone:hover { border-color: var(--accent); color: var(--accent); }

/* ---- 全局 spinner ---- */
.spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid #ddd;
  border-top: 2px solid var(--accent);
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 响应式：小屏时侧边栏变窄 */
@media (max-width: 768px) {
  .sidebar { width: 160px; }
  .field-grid, .field-grid-3 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ========== 侧边栏 ========== -->
<aside class="sidebar">
  <div class="sidebar-header">⚙ 内容管理</div>
  <nav class="sidebar-nav" id="sidebarNav">
    <!-- JS 动态生成 -->
  </nav>
</aside>

<!-- ========== 主区域 ========== -->
<div class="main">
  <div class="topbar">
    <span class="topbar-title" id="topbarTitle">管理后台</span>
    <div class="topbar-actions">
      <button class="btn" id="btnRefresh" title="重新加载数据">🔄 刷新</button>
      <button class="btn btn-primary" id="btnSave" title="保存所有更改到 data.js">💾 保存</button>
    </div>
  </div>
  <div class="content" id="contentArea">
    <!-- JS 动态生成各区块 -->
  </div>
</div>

<!-- ========== 隐藏的文件 input ========== -->
<input type="file" id="hiddenFileInput" style="display:none" accept="image/*">
<input type="file" id="hiddenVideoInput" style="display:none" accept="video/*">

<script>
/* ============================================================
   CMS 管理后台 JavaScript
   ============================================================ */
(function() {
  'use strict';

  const API = '';  // 同源请求

  // ---- 状态 ----
  let state = null;
  let originalData = null;
  let activeUploadTarget = null;  // 当前正在等待上传的字段回调

  // ---- DOM ----
  const $sidebar = document.getElementById('sidebarNav');
  const $content = document.getElementById('contentArea');
  const $btnSave = document.getElementById('btnSave');
  const $btnRefresh = document.getElementById('btnRefresh');
  const $hiddenFile = document.getElementById('hiddenFileInput');
  const $hiddenVideo = document.getElementById('hiddenVideoInput');

  // ---- Toast ----
  function toast(msg, type) {
    type = type || 'success';
    const el = document.createElement('div');
    el.className = 'toast toast-' + type;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function() { el.remove(); }, 2500);
  }

  // ---- 侧边栏导航 ----
  const SECTION_DEFS = [
    { id: 'sec-site', label: '站点信息', icon: '🏠' },
    { id: 'sec-nav', label: '导航链接', icon: '🔗' },
    { id: 'sec-cover', label: '封面页', icon: '🎬' },
    { id: 'sec-cover-images', label: '封面图片', icon: '🖼️' },
    { id: 'sec-personal', label: '个人信息', icon: '👤' },
    { id: 'sec-work', label: '工作经验', icon: '💼' },
    { id: 'sec-project', label: '项目经验', icon: '📋' },
    { id: 'sec-research', label: '科研经历', icon: '🔬' },
    { id: 'sec-skills', label: '我的技能', icon: '🛠' },
    { id: 'sec-matcher-content', label: 'AI匹配器', icon: '🤖' },
    { id: 'sec-portfolio', label: '作品集', icon: '🎨' },
    { id: 'sec-pdfs', label: 'PDF下载', icon: '📄' },
    { id: 'sec-resume', label: '核心简历', icon: '📝' },
    { id: 'sec-footer', label: '页脚', icon: '📌' },
    { id: 'sec-theme', label: '主题设置', icon: '🎨' },
    { id: 'sec-textstyles', label: '文字样式', icon: '📝' },
    { id: 'sec-backgrounds', label: '背景设置', icon: '🖼️' },
  ];

  function buildSidebar() {
    $sidebar.innerHTML = '';
    SECTION_DEFS.forEach(function(sec) {
      const a = document.createElement('a');
      a.href = '#' + sec.id;
      a.textContent = sec.icon + ' ' + sec.label;
      a.addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById(sec.id).scrollIntoView({ behavior: 'smooth' });
        // 高亮
        $sidebar.querySelectorAll('a').forEach(function(el) { el.classList.remove('active'); });
        a.classList.add('active');
      });
      $sidebar.appendChild(a);
    });
  }

  // ---- 工具函数 ----
  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function getByPath(obj, path) {
    return path.split('.').reduce(function(o, k) { return (o && o[k] !== undefined) ? o[k] : null; }, obj);
  }

  function setByPath(obj, path, val) {
    const keys = path.split('.');
    let o = obj;
    for (let i = 0; i < keys.length - 1; i++) {
      const k = keys[i];
      if (!(k in o) || typeof o[k] !== 'object' || o[k] === null) {
        o[k] = {};
      }
      o = o[k];
    }
    o[keys[keys.length - 1]] = val;
  }

  // ---- 生成唯一 section ID ----
  let sectionIdCounter = 0;
  function nextSectionId() { return 'sec-auto-' + (++sectionIdCounter); }

  // ============================================================
  // 编辑器组件
  // ============================================================

  // ---- 文字字段 (inline edit) ----
  function createTextField(path, placeholder) {
    const value = getByPath(state, path) || '';
    const span = document.createElement('span');
    span.className = 'editable-text';
    span.contentEditable = 'true';
    span.setAttribute('data-placeholder', placeholder || '点击编辑...');
    span.textContent = value;

    span.addEventListener('focus', function() {
      if (span.textContent === (placeholder || '')) {
        span.textContent = '';
      }
    });
    span.addEventListener('blur', function() {
      const newVal = span.textContent.trim();
      setByPath(state, path, newVal);
    });
    // Enter 键失焦
    span.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        span.blur();
      }
    });

    return span;
  }

  function createTextFieldRow(label, path, placeholder) {
    const row = document.createElement('div');
    row.className = 'field-row';
    const lbl = document.createElement('label');
    lbl.className = 'field-label';
    lbl.textContent = label;
    row.appendChild(lbl);
    row.appendChild(createTextField(path, placeholder));
    return row;
  }

  // ---- 文本域 ----
  function createTextArea(path, placeholder) {
    const value = getByPath(state, path) || '';
    const ta = document.createElement('textarea');
    ta.className = 'editable-textarea';
    ta.placeholder = placeholder || '点击编辑...';
    ta.value = value;

    ta.addEventListener('input', function() {
      setByPath(state, path, ta.value);
    });

    return ta;
  }

  function createTextAreaRow(label, path, placeholder) {
    const row = document.createElement('div');
    row.className = 'field-row';
    const lbl = document.createElement('label');
    lbl.className = 'field-label';
    lbl.textContent = label;
    row.appendChild(lbl);
    row.appendChild(createTextArea(path, placeholder));
    return row;
  }

  // ---- 图片字段 ----
  function createImageField(path, uploadDir) {
    const value = getByPath(state, path) || '';
    const wrapper = document.createElement('div');
    wrapper.className = 'image-field';

    // 预览
    const preview = document.createElement('div');
    preview.className = 'image-preview';
    if (value && value !== '待填写') {
      const img = document.createElement('img');
      img.src = value;
      img.alt = '';
      img.onerror = function() { preview.innerHTML = '<span class="placeholder">图片加载失败</span>'; };
      preview.appendChild(img);
    } else {
      preview.innerHTML = '<span class="placeholder">点击上传<br>或拖拽图片</span>';
    }

    // 拖拽上传
    preview.addEventListener('dragover', function(e) { e.preventDefault(); preview.style.borderColor = '#2563eb'; });
    preview.addEventListener('dragleave', function() { preview.style.borderColor = ''; });
    preview.addEventListener('drop', function(e) {
      e.preventDefault();
      preview.style.borderColor = '';
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        uploadAndSet(file, uploadDir, path, preview);
      }
    });
    preview.addEventListener('click', function() {
      activeUploadTarget = { path: path, uploadDir: uploadDir, preview: preview };
      $hiddenFile.click();
    });

    // 操作按钮
    const actions = document.createElement('div');
    actions.className = 'image-field-actions';

    const uploadBtn = document.createElement('button');
    uploadBtn.className = 'btn btn-sm';
    uploadBtn.textContent = '📷 更换图片';
    uploadBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      activeUploadTarget = { path: path, uploadDir: uploadDir, preview: preview };
      $hiddenFile.click();
    });

    const clearBtn = document.createElement('button');
    clearBtn.className = 'btn btn-sm';
    clearBtn.textContent = '✕ 清除';
    clearBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      setByPath(state, path, '');
      preview.innerHTML = '<span class="placeholder">点击上传<br>或拖拽图片</span>';
    });

    actions.appendChild(uploadBtn);
    actions.appendChild(clearBtn);

    // 路径显示
    const pathDisplay = document.createElement('div');
    pathDisplay.className = 'image-path-display';
    pathDisplay.textContent = value || '未设置';

    const rightCol = document.createElement('div');
    rightCol.style.display = 'flex';
    rightCol.style.flexDirection = 'column';
    rightCol.style.gap = '6px';
    rightCol.appendChild(actions);
    rightCol.appendChild(pathDisplay);

    wrapper.appendChild(preview);
    wrapper.appendChild(rightCol);
    return wrapper;
  }

  function createImageFieldRow(label, path, uploadDir) {
    const row = document.createElement('div');
    row.className = 'field-row';
    const lbl = document.createElement('label');
    lbl.className = 'field-label';
    lbl.textContent = label;
    row.appendChild(lbl);
    row.appendChild(createImageField(path, uploadDir));
    return row;
  }

  // ---- 上传逻辑 ----
  function uploadAndSet(file, uploadDir, dataPath, previewEl) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('directory', uploadDir);

    // 显示上传中
    if (previewEl) {
      previewEl.innerHTML = '<div class="spinner"></div>';
    }

    fetch(API + '/api/upload', { method: 'POST', body: formData })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          const imgPath = data.path;
          setByPath(state, dataPath, imgPath);
          if (previewEl) {
            const img = document.createElement('img');
            img.src = imgPath + '?t=' + Date.now();
            img.alt = '';
            previewEl.innerHTML = '';
            previewEl.appendChild(img);
          }
          // 更新路径显示
          const pathDisplay = previewEl && previewEl.parentElement &&
            previewEl.parentElement.querySelector('.image-path-display');
          if (pathDisplay) pathDisplay.textContent = imgPath;
          toast('图片上传成功 ✓');
        } else {
          toast('上传失败: ' + (data.error || '未知错误'), 'error');
          if (previewEl) {
            previewEl.innerHTML = '<span class="placeholder">上传失败<br>点击重试</span>';
          }
        }
      })
      .catch(function(err) {
        toast('上传失败: ' + err.message, 'error');
        if (previewEl) {
          previewEl.innerHTML = '<span class="placeholder">上传失败<br>点击重试</span>';
        }
      });
  }

  // ---- 隐藏文件 input 事件 ----
  $hiddenFile.addEventListener('change', function() {
    if (!activeUploadTarget || !$hiddenFile.files.length) return;
    const file = $hiddenFile.files[0];

    // 回调式上传（背景设置等自定义场景）
    if (activeUploadTarget.onUploaded) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('directory', activeUploadTarget.uploadDir);
      fetch(API + '/api/upload', { method: 'POST', body: formData })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.ok) {
            activeUploadTarget.onUploaded(data.path);
            toast('图片上传成功 ✓');
          } else {
            toast('上传失败: ' + (data.error || '未知错误'), 'error');
          }
          $hiddenFile.value = '';
          activeUploadTarget = null;
        })
        .catch(function(err) {
          toast('上传失败: ' + err.message, 'error');
          $hiddenFile.value = '';
          activeUploadTarget = null;
        });
      return;
    }

    // 字符串列表中的图片上传
    if (activeUploadTarget.isStringList) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('directory', activeUploadTarget.uploadDir);
      fetch(API + '/api/upload', { method: 'POST', body: formData })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.ok) {
            const arr = getByPath(state, activeUploadTarget.path) || [];
            arr[activeUploadTarget.idx] = data.path;
            setByPath(state, activeUploadTarget.path, arr);
            if (activeUploadTarget.renderFn) activeUploadTarget.renderFn();
            toast('图片上传成功 ✓');
          } else {

  $hiddenVideo.addEventListener('change', function() {
    if (!activeUploadTarget || !$hiddenVideo.files.length) return;
    const file = $hiddenVideo.files[0];

    // 回调式视频上传（背景设置等）
    if (activeUploadTarget.onUploaded) {
      const formData = new FormData();
      formData.append('file', file);
      fetch(API + '/api/upload/video', { method: 'POST', body: formData })
        .then(function(r) { return r.json(); })
        .then(function(data) {

            activeUploadTarget.onUploaded(data.path);

        .catch(function(err) {

          $hiddenVideo.value = '';
          activeUploadTarget = null;
        });
      return;
    }

    const formData = new FormData();

      activeUploadTarget.preview.innerHTML = '<div class="spinner"></div>';

    fetch(API + '/api/upload/video', { method: 'POST', body: formData })
      .then(function(r) { return r.json(); })

        if (data.ok) {
          if (activeUploadTarget.path) {
            setByPath(state, activeUploadTarget.path, data.path);
          } else {
            // 通用视频上传 → 尝试自动填入当前展开的视频项
            var openItem = document.querySelector('.object-list-item.open');
            if (openItem) {
              var allItems = openItem.parentElement.querySelectorAll('.object-list-item');
              var idx = -1;
              for (var i = 0; i < allItems.length; i++) {
                if (allItems[i] === openItem) { idx = i; break; }
              }
              if (idx >= 0) {
                var srcPath = 'portfolio.video.' + idx + '.src';
                setByPath(state, srcPath, data.path);
                var input = openItem.querySelector('input[type="text"][data-path$="\\.src"]');
                if (!input) {
                  var inputs = openItem.querySelectorAll('input[type="text"]');
                  inputs.forEach(function(inp) {
                    if (inp.dataset.path && inp.dataset.path.endsWith('.src')) input = inp;
                  });
                }
                if (input) { input.value = data.path; input.dispatchEvent(new Event('input')); }
                toast('视频上传成功！已自动填入 #' + (idx + 1) + ' 的 src: ' + data.path);
              }
            } else {
              toast('视频上传成功！路径: ' + data.path + '（请展开一个视频项后再上传以自动填入）');

            activeUploadTarget.preview.innerHTML = '<span style="font-size:12px;color:#16a34a;">✓ ' + data.path.split('/').pop() + '</span>';
          }
        } else {
          toast('上传失败: ' + (data.error || '未知错误'), 'error');
        }
        $hiddenVideo.value = '';
        activeUploadTarget = null;
      })
      .catch(function(err) {
        toast('上传失败: ' + err.message, 'error');
        $hiddenVideo.value = '';
        activeUploadTarget = null;
      });

  // ---- 通用对象列表编辑器 ----
  function createObjectList(path, schema, summaryFn, defaults) {
    defaults = defaults || {};
    const items = getByPath(state, path) || [];
    const container = document.createElement('div');

    function render() {
      container.innerHTML = '';
      const list = getByPath(state, path) || [];

      if (list.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-hint';
        empty.textContent = '暂无数据';
        container.appendChild(empty);
      }

      list.forEach(function(item, idx) {
        const card = document.createElement('div');
        card.className = 'object-list-item';

        // 头部（可折叠）
        const header = document.createElement('div');
        header.className = 'object-list-item-header';

        const titleSpan = document.createElement('span');
        titleSpan.textContent = '#' + (idx + 1);
        titleSpan.style.fontWeight = '700';

        const summarySpan = document.createElement('span');
        summarySpan.className = 'object-list-item-summary';
        summarySpan.textContent = summaryFn ? summaryFn(item) : JSON.stringify(item).substring(0, 60);

        const actionsSpan = document.createElement('span');
        actionsSpan.style.display = 'flex';
        actionsSpan.style.gap = '4px';

        const moveUpBtn = document.createElement('button');
        moveUpBtn.className = 'btn btn-sm';
        moveUpBtn.textContent = '↑';
        moveUpBtn.disabled = idx === 0;
        moveUpBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          const arr = getByPath(state, path) || [];
          if (idx > 0) {
            const tmp = arr[idx - 1];
            arr[idx - 1] = arr[idx];
            arr[idx] = tmp;
            setByPath(state, path, arr);
            render();
          }
        });

        const moveDownBtn = document.createElement('button');
        moveDownBtn.className = 'btn btn-sm';
        moveDownBtn.textContent = '↓';
        moveDownBtn.disabled = idx === list.length - 1;
        moveDownBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          const arr = getByPath(state, path) || [];
          if (idx < arr.length - 1) {
            const tmp = arr[idx + 1];
            arr[idx + 1] = arr[idx];
            arr[idx] = tmp;
            setByPath(state, path, arr);
            render();
          }
        });

        const delBtn = document.createElement('button');
        delBtn.className = 'btn btn-sm btn-danger';
        delBtn.textContent = '🗑';
        delBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          if (confirm('确定删除 #' + (idx + 1) + '？')) {
            const arr = getByPath(state, path) || [];
            arr.splice(idx, 1);
            setByPath(state, path, arr);
            render();
          }
        });

        actionsSpan.appendChild(moveUpBtn);
        actionsSpan.appendChild(moveDownBtn);
        actionsSpan.appendChild(delBtn);

        header.appendChild(titleSpan);
        header.appendChild(summarySpan);
        header.appendChild(actionsSpan);

        header.addEventListener('click', function(e) {
          if (e.target.tagName === 'BUTTON') return;
          card.classList.toggle('open');
        });

        // 内容区
        const body = document.createElement('div');
        body.className = 'object-list-item-body';

        // 根据 schema 渲染子字段
        schema.forEach(function(field) {
          const itemPath = path + '.' + idx + '.' + field.key;
          if (field.type === 'text') {
            body.appendChild(createTextFieldRow(field.label, itemPath, field.placeholder));
          } else if (field.type === 'textarea') {
            body.appendChild(createTextAreaRow(field.label, itemPath, field.placeholder));
          } else if (field.type === 'image') {
            body.appendChild(createImageFieldRow(field.label, itemPath, field.uploadDir));
          } else if (field.type === 'stringList') {
            body.appendChild(createStringListRow(field.label, itemPath, field.placeholder));
          } else if (field.type === 'imageStringList') {
            body.appendChild(createImageStringListRow(field.label, itemPath, field.uploadDir));
          } else if (field.type === 'imageWithTitleList') {
            body.appendChild(createImageWithTitleListRow(field.label, itemPath, field.uploadDir));
          }
        });

        card.appendChild(header);
        card.appendChild(body);
        container.appendChild(card);
      });

      // 添加按钮
      const addRow = document.createElement('div');
      addRow.className = 'add-btn-row';
      const addBtn = document.createElement('button');
      addBtn.className = 'btn';
      addBtn.textContent = '+ 添加项';
      addBtn.addEventListener('click', function() {
        const arr = getByPath(state, path) || [];
        // 创建默认空对象
        const newItem = {};
        schema.forEach(function(field) {
          if (field.type === 'stringList') newItem[field.key] = [];
          else if (field.type === 'image' || field.type === 'text' || field.type === 'textarea') newItem[field.key] = '';
          else newItem[field.key] = '';
        });
        // 合并额外默认值
        for (var dk in defaults) {
          if (defaults.hasOwnProperty(dk) && !(dk in newItem)) {
            newItem[dk] = JSON.parse(JSON.stringify(defaults[dk]));
          }
        }
        arr.push(newItem);
        setByPath(state, path, arr);
        render();
        // 自动展开新项目
        setTimeout(function() {
          const cards = container.querySelectorAll('.object-list-item');
          const lastCard = cards[cards.length - 1];
          if (lastCard) lastCard.classList.add('open');
        }, 50);
      });
      addRow.appendChild(addBtn);
      container.appendChild(addRow);
    }

    render();
    return container;
  }

  // ════════════════════════════════════════════════

  function renderCoverImagesSection() {
    // 先移除旧卡片
    var oldCard = document.getElementById('sec-cover-images');
    if (oldCard) oldCard.remove();

    const { card, body } = createSectionCard('sec-cover-images', '🖼️ 封面图片');
    if (!state.coverImages) state.coverImages = { main:[], bg:[], mainSize:'15vw', bgSize:'9vw', mainOpacity:1, bgOpacity:0.45 };
    var ci = state.coverImages;
    if (!ci.main) ci.main = [];
    if (!ci.bg) ci.bg = [];

    // ── 大小与透明度 ──
    var slidersRow = document.createElement('div');
    slidersRow.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;';

    function makeSlider(label, key, min, max, step, unit) {
      var wrap = document.createElement('div');
      var lbl = document.createElement('div');
      lbl.style.cssText = 'font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:2px;';
      lbl.textContent = label + ': ' + (ci[key] !== undefined ? ci[key] : '');
      var input = document.createElement('input');
      input.type = 'range'; input.min = min; input.max = max; input.step = step;
      input.value = parseFloat(ci[key]) || 0;
      input.style.cssText = 'width:100%;';
      input.addEventListener('input', function() { ci[key] = input.value + (unit || ''); lbl.textContent = label + ': ' + ci[key]; });
      wrap.appendChild(lbl); wrap.appendChild(input);
      return wrap;
    }

    function makeOpacitySlider(label, key) {
      var wrap = document.createElement('div');
      var lbl = document.createElement('div');
      lbl.style.cssText = 'font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:2px;';
      lbl.textContent = label + ': ' + (ci[key] !== undefined ? ci[key] : '');
      var input = document.createElement('input');
      input.type = 'range'; input.min = 0; input.max = 1; input.step = 0.05;
      input.value = ci[key] !== undefined ? ci[key] : 1;
      input.style.cssText = 'width:100%;';
      input.addEventListener('input', function() { ci[key] = parseFloat(input.value); lbl.textContent = label + ': ' + ci[key]; });
      wrap.appendChild(lbl); wrap.appendChild(input);
      return wrap;
    }

    slidersRow.appendChild(makeSlider('主图大小', 'mainSize', 5, 30, 1, 'vw'));
    slidersRow.appendChild(makeSlider('背景图大小', 'bgSize', 3, 20, 1, 'vw'));
    slidersRow.appendChild(makeOpacitySlider('主图透明度', 'mainOpacity'));
    slidersRow.appendChild(makeOpacitySlider('背景图透明度', 'bgOpacity'));
    body.appendChild(slidersRow);

    // ── 主图列表 ──
    var mainLabel = document.createElement('div');
    mainLabel.style.cssText = 'font-size:13px;font-weight:700;margin-bottom:6px;margin-top:8px;';
    mainLabel.textContent = '📷 主图（' + ci.main.length + ' 张）';
    body.appendChild(mainLabel);

    ci.main.forEach(function(img, idx) {
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:4px;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius);';
      var num = document.createElement('span');
      num.style.cssText = 'font-size:12px;font-weight:600;min-width:24px;';
      num.textContent = '#' + (idx + 1);
      row.appendChild(num);

      var thumb = document.createElement('div');
      thumb.style.cssText = 'width:48px;height:36px;border:1px dashed var(--border);border-radius:3px;overflow:hidden;flex-shrink:0;background:#f9f9f9;cursor:pointer;display:flex;align-items:center;justify-content:center;';
      if (img.url) { var im = document.createElement('img'); im.src = img.url; im.style.cssText = 'width:100%;height:100%;object-fit:cover;'; thumb.appendChild(im); }
      else thumb.innerHTML = '<span style="font-size:10px;color:var(--text-muted);">上传</span>';
      thumb.addEventListener('click', function() {
        activeUploadTarget = { uploadDir:'images/cover', onUploaded: function(p) { img.url = p; renderCoverImagesSection(); } };
        $hiddenFile.click();
      });
      row.appendChild(thumb);

      var posInputs = document.createElement('div');
      posInputs.style.cssText = 'display:flex;gap:4px;font-size:11px;';
      ['top','left','right'].forEach(function(prop) {
        var lbl2 = document.createElement('span');
        lbl2.textContent = prop + ':'; lbl2.style.cssText = 'color:var(--text-muted);';
        var inp = document.createElement('input');
        inp.style.cssText = 'width:48px;padding:2px 4px;border:1px solid var(--border);border-radius:3px;font-size:11px;';
        inp.value = img[prop] || '';
        inp.placeholder = 'auto';
        inp.addEventListener('change', function() { img[prop] = inp.value.trim(); });
        posInputs.appendChild(lbl2); posInputs.appendChild(inp);
      });
      row.appendChild(posInputs);

      var delBtn = document.createElement('button');
      delBtn.className = 'btn btn-sm btn-danger'; delBtn.textContent = '✕';
      delBtn.addEventListener('click', function() { ci.main.splice(idx, 1); renderCoverImagesSection(); });
      row.appendChild(delBtn);
      body.appendChild(row);
    });

    var addMainBtn = document.createElement('button');
    addMainBtn.className = 'btn btn-sm'; addMainBtn.textContent = '+ 添加主图';
    addMainBtn.addEventListener('click', function() { ci.main.push({ url:'', top:'', left:'' }); renderCoverImagesSection(); });
    body.appendChild(addMainBtn);

    // ── 背景图列表 ──
    var bgLabel = document.createElement('div');
    bgLabel.style.cssText = 'font-size:13px;font-weight:700;margin-bottom:6px;margin-top:16px;';
    bgLabel.textContent = '🌫 背景图（' + ci.bg.length + ' 张）';
    body.appendChild(bgLabel);

    ci.bg.forEach(function(img, idx) {
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:4px;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius);';
      var num = document.createElement('span');
      num.style.cssText = 'font-size:12px;font-weight:600;min-width:24px;';
      num.textContent = '#' + (idx + 1);
      row.appendChild(num);

      var thumb = document.createElement('div');
      thumb.style.cssText = 'width:48px;height:36px;border:1px dashed var(--border);border-radius:3px;overflow:hidden;flex-shrink:0;background:#f9f9f9;cursor:pointer;display:flex;align-items:center;justify-content:center;';
      if (img.url) { var im = document.createElement('img'); im.src = img.url; im.style.cssText = 'width:100%;height:100%;object-fit:cover;'; thumb.appendChild(im); }
      else thumb.innerHTML = '<span style="font-size:10px;color:var(--text-muted);">上传</span>';
      thumb.addEventListener('click', function() {
        activeUploadTarget = { uploadDir:'images/cover', onUploaded: function(p) { img.url = p; renderCoverImagesSection(); } };
        $hiddenFile.click();
      });
      row.appendChild(thumb);

      var posInputs = document.createElement('div');
      posInputs.style.cssText = 'display:flex;gap:4px;font-size:11px;';
      ['top','left','right'].forEach(function(prop) {
        var lbl2 = document.createElement('span');
        lbl2.textContent = prop + ':'; lbl2.style.cssText = 'color:var(--text-muted);';
        var inp = document.createElement('input');
        inp.style.cssText = 'width:48px;padding:2px 4px;border:1px solid var(--border);border-radius:3px;font-size:11px;';
        inp.value = img[prop] || '';
        inp.placeholder = 'auto';
        inp.addEventListener('change', function() { img[prop] = inp.value.trim(); });
        posInputs.appendChild(lbl2); posInputs.appendChild(inp);
      });
      row.appendChild(posInputs);

      var delBtn = document.createElement('button');
      delBtn.className = 'btn btn-sm btn-danger'; delBtn.textContent = '✕';
      delBtn.addEventListener('click', function() { ci.bg.splice(idx, 1); renderCoverImagesSection(); });
      row.appendChild(delBtn);
      body.appendChild(row);
    });

    var addBgBtn = document.createElement('button');
    addBgBtn.className = 'btn btn-sm'; addBgBtn.textContent = '+ 添加背景图';
    addBgBtn.addEventListener('click', function() { ci.bg.push({ url:'', top:'', left:'' }); renderCoverImagesSection(); });

  }

    ], function(item) { return item.title || '未命名视频'; });
    body.appendChild(videoListEl);

    // 视频文件上传
    const videoSrcHint = document.createElement('p');
    videoSrcHint.style.cssText = 'font-size:12px;color:var(--text-muted);margin-top:4px;';
    videoSrcHint.textContent = '📹 上传视频：先展开要关联的视频项，再使用下方按钮上传，路径会自动填入该视频的 src 字段。';
    body.appendChild(videoSrcHint);

    // 辅助：获取当前展开的视频项的索引
    function getOpenVideoIndex() {
      var openEl = videoListEl.querySelector('.object-list-item.open');
      if (!openEl) return -1;
      var items = videoListEl.querySelectorAll('.object-list-item');
      for (var i = 0; i < items.length; i++) {
        if (items[i] === openEl) return i;
      }
      return -1;
    }

    // 上传成功后自动填入 src
    function onVideoUploadSuccess(videoPath) {
      var idx = getOpenVideoIndex();
      if (idx >= 0) {
        var srcPath = 'portfolio.video.' + idx + '.src';
        setByPath(state, srcPath, videoPath);
        // 同步更新 DOM 中的 input
        var openEl = videoListEl.querySelector('.object-list-item.open');
        if (openEl) {
          var input = openEl.querySelector('input[type="text"][data-path$=".src"]');
          if (!input) {
            // 回退：找所有 text input
            var inputs = openEl.querySelectorAll('input[type="text"]');
            inputs.forEach(function(inp) {
              if (inp.dataset.path && inp.dataset.path.endsWith('.src')) input = inp;
            });
          }
          if (input) { input.value = videoPath; input.dispatchEvent(new Event('input')); }
        }
        toast('视频上传成功！已自动填入 #' + (idx + 1) + ' 的 src: ' + videoPath);
      } else {
        toast('视频上传成功！路径: ' + videoPath + '（请展开一个视频项后再上传以自动填入）');
      }
    }

    var videoUploadZone = document.createElement('div');
    videoUploadZone.className = 'upload-zone';
    videoUploadZone.textContent = '📹 点击或拖拽上传视频文件（将保存到 videos/ 目录）';
    videoUploadZone.addEventListener('click', function() {
      activeUploadTarget = { path: null, uploadDir: 'videos', preview: videoUploadZone };
      $hiddenVideo.click();
    });
    videoUploadZone.addEventListener('dragover', function(e) { e.preventDefault(); });
    videoUploadZone.addEventListener('drop', function(e) {
      e.preventDefault();
      var file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('video/')) {
        var formData = new FormData();
        formData.append('file', file);
        videoUploadZone.innerHTML = '<div class="spinner"></div> 上传中...';
        fetch(API + '/api/upload/video', { method: 'POST', body: formData })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.ok) {
              videoUploadZone.innerHTML = '<span style="color:#16a34a;">✓ 上传成功: ' + data.path + '</span>';
              onVideoUploadSuccess(data.path);
            } else {
              videoUploadZone.textContent = '📹 上传失败，点击重试';
              toast('上传失败: ' + (data.error || '未知错误'), 'error');
            }
          });
      }
    });
    body.appendChild(videoUploadZone);

    $content.appendChild(card);
  }

  // ══════════════════════════════════════════════════════════
  // 背景设置 V2 — 自由分组
  // ══════════════════════════════════════════════════════════
  function renderBackgroundsSection() {
    var obj = createSectionCard('sec-backgrounds', '🖼️ 背景设置');
    var card = obj.card;
    var body = obj.body;
    var uploadDir = 'images/backgrounds';

    // 初始化数据结构
    if (!state.sectionBackgrounds) state.sectionBackgrounds = { groups: [], singles: {} };
    var bg = state.sectionBackgrounds;
    if (!bg.groups) bg.groups = [];
    if (!bg.singles) bg.singles = {};

    var ALL_IDS = ['cover','personal','matcher','skills','experience','research','portfolio','siteFooter'];
    var LABELS = {
      cover:'🎬 封面', personal:'👤 个人信息', matcher:'🤖 AI匹配器', skills:'🛠 个人技能',
      experience:'💼 工作&项目经历', research:'🔬 科研经历', portfolio:'🎨 作品集', siteFooter:'📌 Lovely to meet u'
    };
    // 保证 singles 里每个板块都有默认值
    ALL_IDS.forEach(function(id) {
      if (!bg.singles[id]) bg.singles[id] = { type:'none', url:'', fillMode:'cover' };
    });

    // ══════════════════════════════════
    // 辅助：获取当前已被分组的 ID 集合
    // ══════════════════════════════════
    function getGroupedIds() {
      var ids = {};
      (bg.groups||[]).forEach(function(g) {
        (g.sections||[]).forEach(function(sid) { ids[sid] = true; });
      });
      return ids;
    }

    // ══════════════════════════════════
    // 辅助：获取当前可加入分组的 ID 列表（排除封面和已分组的）
    // ══════════════════════════════════
    function getAvailableIds() {
      var grouped = getGroupedIds();
      return ALL_IDS.filter(function(id) { return id !== 'cover' && !grouped[id]; });
    }

    // ══════════════════════════════════
    // 辅助：上传回调工厂
    // ══════════════════════════════════
    function makeUploadCallback(setFn) {
      return function(imgPath) { setFn(imgPath); renderAll(); };
    }

    // ══════════════════════════════════
    // 辅助：渲染上传预览缩略图
    // ══════════════════════════════════
    function createThumb(url, setUrlFn) {
      var preview = document.createElement('div');
      preview.style.cssText = 'width:72px;height:48px;border:1px dashed var(--border);border-radius:4px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#f9f9f9;cursor:pointer;';
      if (url) {
        var img = document.createElement('img');
        img.src = url; img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
        img.onerror = function() { preview.innerHTML = '<span style="font-size:11px;color:var(--text-muted);">加载失败</span>'; };
        preview.appendChild(img);
      } else {
        preview.innerHTML = '<span style="font-size:11px;color:var(--text-muted);text-align:center;">点击上传</span>';
      }
      preview.addEventListener('dragover', function(e) { e.preventDefault(); });
      preview.addEventListener('drop', function(e) {
        e.preventDefault();
        var file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) doUploadImage(file, setUrlFn, preview);
      });
      preview.addEventListener('click', function() {
        // 创建独立的文件输入，避免全局 $hiddenFile 状态冲突
        var input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.style.display = 'none';
        document.body.appendChild(input);
        input.addEventListener('change', function() {
          if (!input.files.length) { input.remove(); return; }
          var file = input.files[0];
          // 显示上传中
          preview.innerHTML = '<div class="spinner"></div>';
          var fd = new FormData();
          fd.append('file', file);
          fd.append('directory', uploadDir);
          fetch(API + '/api/upload', { method: 'POST', body: fd })
            .then(function(r) { return r.json(); })
            .then(function(d) {
              if (d.ok) {
                setUrlFn(d.path);
                toast('上传成功 ✓');
              } else {
                toast('上传失败: ' + (d.error || '未知错误'), 'error');
              }
              renderAll();
              input.remove();
            })
            .catch(function(e) {
              toast('上传失败: ' + e.message, 'error');
              renderAll();
              input.remove();
            });
        });
        input.click();
      });
      return preview;
    }

    function doUploadImage(file, setFn, previewEl) {
      var fd = new FormData(); fd.append('file', file); fd.append('directory', uploadDir);
      if (previewEl) previewEl.innerHTML = '<div class="spinner"></div>';
      fetch(API+'/api/upload', { method:'POST', body:fd })
        .then(function(r){ return r.json(); })
        .then(function(d){ if(d.ok){ setFn(d.path); toast('上传成功 ✓'); } else toast('上传失败: '+(d.error||'未知错误'),'error'); renderAll(); })
        .catch(function(e){ toast('上传失败: '+e.message,'error'); renderAll(); });
    }

    // ══════════════════════════════════
    // 辅助：填充方式下拉
    // ══════════════════════════════════
    function createFillSelect(curVal, onChange) {
      var sel = document.createElement('select');
      sel.style.cssText = 'padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;';
      [{v:'cover',t:'铺满裁剪'},{v:'contain',t:'完整显示'},{v:'stretch',t:'拉伸填充'}].forEach(function(f){
        var o = document.createElement('option'); o.value = f.v; o.textContent = f.t;
        if (curVal === f.v) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener('change', function(){ onChange(sel.value); });
      return sel;
    }

    // ══════════════════════════════════
    // 辅助：类型下拉
    // ══════════════════════════════════
    function createTypeSelect(curVal, onChange) {
      var sel = document.createElement('select');
      sel.style.cssText = 'padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;';
      [{v:'none',t:'无'},{v:'image',t:'🖼 图片'},{v:'video',t:'🎬 视频'}].forEach(function(opt){
        var o = document.createElement('option'); o.value = opt.v; o.textContent = opt.t;
        if (curVal === opt.v) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener('change', function(){ onChange(sel.value); });
      return sel;
    }

    // ══════════════════════════════════
    // 主渲染
    // ══════════════════════════════════
    function renderAll() {
      body.innerHTML = '';
      var grouped = getGroupedIds();

      // ── 提示 ──
      var desc = document.createElement('p');
      desc.style.cssText = 'font-size:12px;color:var(--text-muted);margin-bottom:14px;';
      desc.textContent = '将多个板块放入同一分组，它们会无缝拼接并共享一张背景图。封面永远独立。';
      body.appendChild(desc);

      // ── 渲染每个分组 ──
      (bg.groups||[]).forEach(function(group, gIdx) {
        var groupCard = document.createElement('div');
        groupCard.style.cssText = 'border:2px solid #2563eb;border-radius:var(--radius);margin-bottom:14px;overflow:hidden;';

        // 分组头部
        var groupHead = document.createElement('div');
        groupHead.style.cssText = 'background:#eff6ff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;';
        var groupTitle = document.createElement('span');
        groupTitle.style.cssText = 'font-weight:700;font-size:13px;color:#2563eb;';
        groupTitle.textContent = '📦 分组 ' + (gIdx + 1);
        var delGroupBtn = document.createElement('button');
        delGroupBtn.className = 'btn btn-sm btn-danger';
        delGroupBtn.textContent = '🗑 删除此分组';
        delGroupBtn.addEventListener('click', function() {
          if (confirm('确定删除分组 ' + (gIdx+1) + '？其中的板块将恢复为独立。')) {
            bg.groups.splice(gIdx, 1);
            renderAll();
          }
        });
        groupHead.appendChild(groupTitle);
        groupHead.appendChild(delGroupBtn);
        groupCard.appendChild(groupHead);

        var groupBody = document.createElement('div');
        groupBody.style.cssText = 'padding:12px 14px;';

        // ── 已选板块标签 ──
        var tagsRow = document.createElement('div');
        tagsRow.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;align-items:center;';
        var tagsLabel = document.createElement('span');
        tagsLabel.style.cssText = 'font-size:12px;color:var(--text-muted);';
        tagsLabel.textContent = '板块：';
        tagsRow.appendChild(tagsLabel);

        (group.sections||[]).forEach(function(sid) {
          var tag = document.createElement('span');
          tag.style.cssText = 'display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:#dbeafe;color:#1e40af;border-radius:20px;font-size:12px;font-weight:500;';
          tag.textContent = LABELS[sid] || sid;
          var xBtn = document.createElement('span');
          xBtn.textContent = '×';
          xBtn.style.cssText = 'cursor:pointer;font-weight:700;margin-left:2px;';
          xBtn.addEventListener('click', function() {
            group.sections = group.sections.filter(function(s) { return s !== sid; });
            if (group.sections.length === 0) { bg.groups.splice(gIdx, 1); }
            renderAll();
          });
          tag.appendChild(xBtn);
          tagsRow.appendChild(tag);
        });

        // ── 添加板块下拉 ──
        var available = getAvailableIds();
        if (available.length > 0) {
          var addSel = document.createElement('select');
          addSel.style.cssText = 'padding:3px 6px;border:1px solid #2563eb;border-radius:4px;font-size:12px;color:#2563eb;';
          var placeholder = document.createElement('option');
          placeholder.value = ''; placeholder.textContent = '+ 添加板块'; placeholder.disabled = true; placeholder.selected = true;
          addSel.appendChild(placeholder);
          available.forEach(function(id) {
            var o = document.createElement('option'); o.value = id; o.textContent = LABELS[id];
            addSel.appendChild(o);
          });
          addSel.addEventListener('change', function() {
            if (addSel.value) {
              if (!group.sections) group.sections = [];
              group.sections.push(addSel.value);
              renderAll();
            }
          });
          tagsRow.appendChild(addSel);
        }
        groupBody.appendChild(tagsRow);

        // ── 背景设置 ──
        if (!group.type) group.type = 'none';
        if (!group.fillMode) group.fillMode = 'cover';
        if (!group.url) group.url = '';

        var bgRow = document.createElement('div');
        bgRow.style.cssText = 'display:flex;align-items:center;gap:10px;flex-wrap:wrap;';

        var typeSel = createTypeSelect(group.type, function(v) {
          group.type = v;
          if (v === 'none') group.url = '';
          renderAll();
        });
        bgRow.appendChild(typeSel);

        if (group.type !== 'none') {
          var thumb = createThumb(group.url, function(p) { group.url = p; });
          bgRow.appendChild(thumb);
          if (group.url) {
            var fn = document.createElement('span');
            fn.style.cssText = 'font-size:11px;color:var(--text-muted);';
            fn.textContent = group.url.split('/').pop();
            bgRow.appendChild(fn);
          }

          if (group.type === 'video') {
            var vInput = document.createElement('input');
            vInput.className = 'inline-input'; vInput.value = group.url||''; vInput.placeholder = '视频路径';
            vInput.style.cssText = 'width:160px;font-size:12px;';
            vInput.addEventListener('input', function(){ group.url = vInput.value.trim(); });
            var vUpBtn = document.createElement('button');
            vUpBtn.className = 'btn btn-sm'; vUpBtn.textContent = '📹 上传';
            vUpBtn.addEventListener('click', function(){
              activeUploadTarget = { uploadDir:'videos', onUploaded: function(p){ group.url = p; renderAll(); } };
              $hiddenVideo.click();
            });
            bgRow.appendChild(vInput); bgRow.appendChild(vUpBtn);
          }

          var fillSel = createFillSelect(group.fillMode, function(v){ group.fillMode = v; });
          bgRow.appendChild(fillSel);

          // ── 双层探照灯 ──
          if (group.type === 'image') {
            var dualRow = document.createElement('div');
            dualRow.style.cssText = 'display:flex;align-items:center;gap:10px;margin-top:6px;flex-wrap:wrap;';

            var dualCheck = document.createElement('label');
            dualCheck.style.cssText = 'font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none;';
            var cb = document.createElement('input');
            cb.type = 'checkbox';
            var hasDual = (group.topUrl !== undefined);
            cb.checked = hasDual;
            cb.style.cssText = 'cursor:pointer;';
            dualCheck.appendChild(cb);
            dualCheck.appendChild(document.createTextNode('🔦 双层探照灯'));
            dualRow.appendChild(dualCheck);

            if (hasDual) {
              if (!group.topUrl) group.topUrl = '';
              var topThumb = createThumb(group.topUrl, function(p) { group.topUrl = p; });
              dualRow.appendChild(topThumb);
              if (group.topUrl) {
                var tfn = document.createElement('span');
                tfn.style.cssText = 'font-size:11px;color:var(--text-muted);';
                tfn.textContent = '表层: ' + group.topUrl.split('/').pop();
                dualRow.appendChild(tfn);
              }
              var topLabel = document.createElement('span');
              topLabel.style.cssText = 'font-size:11px;color:var(--text-muted);';
              topLabel.textContent = '← 表层图片（鼠标探照灯）';
              dualRow.appendChild(topLabel);
            }

            cb.addEventListener('change', function() {
              if (cb.checked) {
                group.topUrl = '';
              } else {
                delete group.topUrl;
              }
              renderAll();
            });
            groupBody.appendChild(dualRow);
          }
        }
        groupBody.appendChild(bgRow);
        groupCard.appendChild(groupBody);
        body.appendChild(groupCard);
      });

      // ── 新建分组按钮 ──
      var addGroupRow = document.createElement('div');
      addGroupRow.style.cssText = 'margin-bottom:16px;';
      var addGroupBtn = document.createElement('button');
      addGroupBtn.className = 'btn btn-primary';
      addGroupBtn.textContent = '+ 新建分组';
      addGroupBtn.addEventListener('click', function() {
        bg.groups.push({ sections:[], type:'none', url:'', fillMode:'cover' });
        renderAll();
      });
      addGroupRow.appendChild(addGroupBtn);
      body.appendChild(addGroupRow);

      // ── 独立板块 ──
      var singlesTitle = document.createElement('div');
      singlesTitle.style.cssText = 'font-size:13px;font-weight:700;color:#333;margin-bottom:10px;padding-top:8px;border-top:2px solid #e0e0e0;';
      singlesTitle.textContent = '📌 独立板块';
      body.appendChild(singlesTitle);

      ALL_IDS.forEach(function(id) {
        if (getGroupedIds()[id]) return; // 已在分组中
        var single = bg.singles[id];
        if (!single) { single = { type:'none', url:'', fillMode:'cover' }; bg.singles[id] = single; }

        var row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;flex-wrap:wrap;';

        var lbl = document.createElement('div');
        lbl.style.cssText = 'font-weight:600;font-size:13px;min-width:130px;';
        lbl.textContent = LABELS[id] || id;
        row.appendChild(lbl);

        var typeSel = createTypeSelect(single.type, function(v){
          single.type = v; if (v==='none') single.url = '';
          renderAll();
        });
        row.appendChild(typeSel);

        if (single.type !== 'none') {
          var thumb = createThumb(single.url, function(p) { single.url = p; });
          row.appendChild(thumb);
          if (single.url) {
            var fn = document.createElement('span');
            fn.style.cssText = 'font-size:11px;color:var(--text-muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
            fn.textContent = single.url.split('/').pop();
            row.appendChild(fn);
          }

          if (single.type === 'video') {
            var vInput = document.createElement('input');
            vInput.className = 'inline-input'; vInput.value = single.url||''; vInput.placeholder = '视频路径';
            vInput.style.cssText = 'width:140px;font-size:12px;';
            vInput.addEventListener('input', function(){ single.url = vInput.value.trim(); });
            var vUpBtn = document.createElement('button');
            vUpBtn.className = 'btn btn-sm'; vUpBtn.textContent = '📹';
            vUpBtn.addEventListener('click', function(){
              activeUploadTarget = { uploadDir:'videos', onUploaded: function(p){ single.url = p; renderAll(); } };
              $hiddenVideo.click();
            });
            row.appendChild(vInput); row.appendChild(vUpBtn);
          }

          var fillSel = createFillSelect(single.fillMode, function(v){ single.fillMode = v; });
          row.appendChild(fillSel);

          // ── 封面双层探照灯 ──
          if (id === 'cover' && single.type === 'image') {
            var spotRow = document.createElement('div');
            spotRow.style.cssText = 'display:flex;align-items:center;gap:6px;width:100%;margin-top:4px;';

            var spotCheck = document.createElement('label');
            spotCheck.style.cssText = 'font-size:11px;cursor:pointer;display:flex;align-items:center;gap:3px;user-select:none;';
            var cb = document.createElement('input');
            cb.type = 'checkbox';
            var hasTop = (single.topUrl !== undefined);
            cb.checked = hasTop;
            cb.style.cssText = 'cursor:pointer;';
            spotCheck.appendChild(cb);
            spotCheck.appendChild(document.createTextNode('🔦 鼠标探照灯'));
            spotRow.appendChild(spotCheck);

            if (hasTop) {
              if (!single.topUrl) single.topUrl = '';
              var topThumb = createThumb(single.topUrl, function(p) { single.topUrl = p; });
              spotRow.appendChild(topThumb);
              if (single.topUrl) {
                var tfn = document.createElement('span');
                tfn.style.cssText = 'font-size:10px;color:var(--text-muted);';
                tfn.textContent = single.topUrl.split('/').pop();
                spotRow.appendChild(tfn);
              }
            }

            cb.addEventListener('change', function() {
              if (cb.checked) {
                single.topUrl = '';
              } else {
                delete single.topUrl;
              }
              renderAll();
            });
            row.appendChild(spotRow);
          }
        }
        body.appendChild(row);
      });

      // 视频上传区域提示
      var videoHint = document.createElement('p');
      videoHint.style.cssText = 'font-size:11px;color:var(--text-muted);margin-top:8px;';

      body.appendChild(videoHint);
    }

    renderAll();
    $content.appendChild(card);
  }

    function buildVarControl(vDef) {
      var row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:8px;';

      var lbl=document.createElement('label');
      lbl.style.cssText='font-size:11px;color:#666;min-width:60px;margin:0;';
      lbl.textContent=vDef.label;

      var curVal=tv(vDef.key)||vDef.def;

      if(vDef.type==='color') {
        var colorInput=document.createElement('input');
        colorInput.type='color';
        colorInput.value=curVal||'#ffffff';
        colorInput.style.cssText='width:30px;height:26px;border:1px solid #ddd;border-radius:3px;cursor:pointer;padding:0;';
        var txtInput=document.createElement('input');
        txtInput.type='text';
        txtInput.value=curVal;
        txtInput.placeholder=vDef.placeholder||'';
        txtInput.style.cssText='flex:1;padding:3px 6px;border:1px solid #ddd;border-radius:3px;font-size:11px;font-family:monospace;width:80px;';
        colorInput.addEventListener('input',function(){ txtInput.value=colorInput.value; setTheme(vDef.key,colorInput.value); });
        txtInput.addEventListener('change',function(){ setTheme(vDef.key,txtInput.value.trim()); });
        row.appendChild(lbl);
        row.appendChild(colorInput);
        row.appendChild(txtInput);
      }
      else if(vDef.type==='align') {
        var grid=document.createElement('div');
        grid.style.cssText='display:inline-grid;grid-template-columns:repeat(3,28px);grid-template-rows:repeat(3,24px);gap:2px;';
        [{v:'left',t:'左'},{v:'center',t:'中'},{v:'right',t:'右'},
         {v:'left',t:''},{v:'center',t:'⊙'},{v:'right',t:''},
         {v:'left',t:''},{v:'center',t:''},{v:'right',t:''}].forEach(function(p){
          var btn=document.createElement('button');
          btn.textContent=p.t||'·';
          btn.style.cssText='border:1px solid #ddd;border-radius:2px;background:'+(curVal===p.v&&p.t?'#2563eb':'#fff')+';color:'+(curVal===p.v&&p.t?'#fff':'#333')+';cursor:pointer;font-size:10px;padding:0;';
          btn.addEventListener('click',function(){ setTheme(vDef.key,p.v); buildControls(); });
          grid.appendChild(btn);
        });
        row.appendChild(lbl);
        row.appendChild(grid);
      }
      else if(vDef.type==='slider') {
        var range=document.createElement('input');
        range.type='range';
        range.min=vDef.min; range.max=vDef.max; range.step=vDef.step;
        var numVal=parseFloat(curVal);
        if(isNaN(numVal)) numVal=0;
        range.value=numVal;
        range.style.cssText='flex:1;';
        var disp=document.createElement('span');
        disp.style.cssText='font-size:11px;font-family:monospace;min-width:44px;text-align:right;';
        disp.textContent=numVal+(vDef.unit||'');
        range.addEventListener('input',function(){
          setTheme(vDef.key,range.value+(vDef.unit||''));
          disp.textContent=range.value+(vDef.unit||'');
        });
        row.appendChild(lbl);
        row.appendChild(range);
        row.appendChild(disp);
      }
      else if(vDef.type==='text') {
        var input=document.createElement('input');
        input.type='text';
        input.value=curVal;
        input.placeholder=vDef.placeholder||vDef.def;
        input.style.cssText='flex:1;padding:3px 6px;border:1px solid #ddd;border-radius:3px;font-size:11px;';
        input.addEventListener('change',function(){ setTheme(vDef.key,input.value.trim()); });
        row.appendChild(lbl);
        row.appendChild(input);
      }

      var resetBtn=document.createElement('button');
      resetBtn.className='btn btn-sm';
      resetBtn.textContent='↺';
      resetBtn.title='恢复默认';
      resetBtn.addEventListener('click',function(){
        setTheme(vDef.key,vDef.def);
        buildControls();
      });
      row.appendChild(resetBtn);

      return row;
    }

    function buildUI() {
      // 重建除 tabBar 外的内容
      // tabBar 已存在，移除后面的
      while(body.children.length>1) body.removeChild(body.lastChild);
      body.appendChild(mainArea);
      buildControls();

    buildUI();
